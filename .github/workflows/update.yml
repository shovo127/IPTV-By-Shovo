name: update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
permissions:
  contents: write
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Update internal playlists
        id: playlist-update
        run: |
          npm run playlist:update
          echo "processed_issues=$(cat temp/logs/playlist_update.log)" >> $GITHUB_OUTPUT
      - name: Check internal playlists
        run: |
          npm run playlist:lint
          npm run playlist:validate
      - name: Generate public playlists
        run: npm run playlist:generate
      - name: Create .api/streams.json
        run: npm run playlist:export
      - name: Update readme
        run: npm run readme:update
      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit changes to /streams
        if: steps.playlist-update.outputs.processed_issues != 0
        run: |
          git add streams
          git status
          git commit --allow-empty -m "[Bot] Update /streams" -m "Committed by github-actions[bot] via update workflow run ${{ github.run_id }}." -m "${{ steps.playlist-update.outputs.processed_issues }}" --no-verify
      - name: Commit changes to PLAYLISTS.md
        run: |
          git add PLAYLISTS.md
          git status
          git commit --allow-empty -m "[Bot] Update PLAYLISTS.md" -m "Committed by github-actions[bot] via update workflow run ${{ github.run_id }}." --no-verify
      - name: Push all changes to the repository
        if: ${{ !env.ACT && github.ref == 'refs/heads/main' }}
        run: git push
      - name: Deploy public playlists to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        if: ${{ !env.ACT && github.ref == 'refs/heads/main' }}
        with:
          branch: gh-pages
          folder: .gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
          commit-message: '[Bot] Deploy to GitHub Pages'
          clean: true
