name: format
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 12 * * *"
permissions:
  contents: write
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Format internal playlists
        run: npm run playlist:format
      - name: Check internal playlists
        run: |
          npm run playlist:lint
          npm run playlist:validate
      - name: Get list of changed files
        id: files_after
        run: |
          ANY_CHANGED=false
          ALL_CHANGED_FILES=$(git diff --diff-filter=ACMRT --name-only main -- streams/ | tr '\n' ' ')
          if [ -n "${ALL_CHANGED_FILES}" ]; then
            ANY_CHANGED=true
          fi
          echo "all_changed_files=$ALL_CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "any_changed=$ANY_CHANGED" >> "$GITHUB_OUTPUT"
      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit changes to /streams
        if: steps.files_after.outputs.any_changed == 'true'
        run: |
          git add streams
          git status
          git commit -m "[Bot] Format /streams" -m "Committed by github-actions[bot] via format workflow run ${{ github.run_id }}." --no-verify
      - name: Push all changes to the repository
        if: ${{ !env.ACT && github.ref == 'refs/heads/main' && steps.files_after.outputs.any_changed == 'true' }}
        run: git push